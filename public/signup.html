<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — MetaLinkNFT</title>
  <link rel="icon" type="image/svg+xml" href="/assets/images/MetaLink-NFT-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/assets/auth.css">
</head>
<body>
  <div class="brand-loader-overlay" id="redirectLoader" style="display:none;">
    <div class="brand-loader">
      <div class="brand-loader-ring"></div>
      <img src="/assets/images/MetaLink-NFT-icon.png" alt="" class="brand-loader-logo">
    </div>
  </div>
  <div class="auth-page">
    <div class="auth-container">
      <a href="/" class="auth-back">&larr; Back to Home</a>
      <div class="auth-card">
        <div class="auth-header">
          <a href="/">
            <img src="/assets/images/MetaLink-NFT-icon.png" alt="MetaLinkNFT" class="auth-logo">
          </a>
          <h1>Create Account</h1>
          <p>Join MetaLinkNFT and start trading NFTs</p>
        </div>
        <form id="signupForm" class="auth-form">
          <div class="auth-field" id="usernameField">
            <label for="signupUsername">Username <span class="required">*</span></label>
            <input type="text" id="signupUsername" placeholder="Choose a username" maxlength="20">
          </div>
          <div class="auth-field">
            <label for="signupEmail">Email <span class="required">*</span></label>
            <input type="email" id="signupEmail" placeholder="Enter your email" required>
          </div>
          <div class="auth-field" id="phoneField">
            <label for="signupPhone">Phone Number <span class="required">*</span></label>
            <div style="display:flex;gap:8px;">
              <select id="signupPhoneCode" style="flex:0 0 auto;max-width:130px;padding:12px 8px;background:var(--bg,#0A0A12);border:1.5px solid var(--border,rgba(255,255,255,0.08));border-radius:12px;color:var(--text,#F4F4FA);font-family:inherit;"></select>
              <input type="tel" id="signupPhone" placeholder="Phone number" style="flex:1;">
            </div>
          </div>
          <div class="auth-field">
            <label for="signupReferral">Referral Code <span class="optional">(optional)</span></label>
            <input type="text" id="signupReferral" placeholder="Enter referral code">
          </div>
          <div class="auth-field" id="forgotCodeField" style="display:none;">
            <label for="forgotCode">Verification Code <span class="required">*</span></label>
            <input type="text" id="forgotCode" placeholder="Enter 6-digit code" maxlength="6" inputmode="numeric">
            <p style="font-size:0.8rem;margin-top:6px;">Didn't get it? <a href="#" id="resendForgotCodeLink">Resend</a></p>
          </div>
          <div class="auth-field">
            <label for="signupPassword">Password <span class="required">*</span></label>
            <div class="auth-password-wrap">
              <input type="password" id="signupPassword" placeholder="Min 6 characters" required>
              <button type="button" class="auth-eye" onclick="togglePassword('signupPassword', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="auth-field">
            <label for="signupConfirm">Confirm Password <span class="required">*</span></label>
            <div class="auth-password-wrap">
              <input type="password" id="signupConfirm" placeholder="Re-enter password" required>
              <button type="button" class="auth-eye" onclick="togglePassword('signupConfirm', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div id="authError" class="auth-error" style="display:none;"></div>
          <div id="authSuccess" class="auth-success" style="display:none;"></div>
          <div id="forgotLink" class="auth-forgot" style="display:none;">
            <a href="/signup.html#forgot">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg auth-submit">Create Account</button>
        </form>

        <div id="verifyStep" style="display:none;">
          <div class="auth-header" style="margin-bottom:20px;">
            <h1>Verify Your Email</h1>
            <p>Enter the 6-digit code sent to <strong id="verifyEmailDisplay"></strong></p>
          </div>
          <div class="auth-field">
            <label for="verifyCode">Verification Code <span class="required">*</span></label>
            <input type="text" id="verifyCode" placeholder="Enter 6-digit code" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
          </div>
          <div id="verifyError" class="auth-error" style="display:none;"></div>
          <div id="verifySuccess" class="auth-success" style="display:none;"></div>
          <button type="button" id="verifySubmitBtn" class="btn btn-primary btn-block btn-lg">Confirm</button>
          <div class="auth-footer" style="margin-top:16px;">
            Didn't get the code? <a href="#" id="resendCodeLink">Resend</a>
          </div>
        </div>

        <div class="auth-footer" id="mainFooter">
          Already have an account? <a href="/signup.html#login">Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Theme
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);

    // Auto-fill referral code from a shared invite link (?ref=UID)
    const refFromLink = new URLSearchParams(window.location.search).get('ref');
    if (refFromLink) document.getElementById('signupReferral').value = refFromLink;

    const COUNTRY_CODES = [
      ['Pakistan','+92'],['Afghanistan','+93'],['Albania','+355'],['Algeria','+213'],['Andorra','+376'],
      ['Angola','+244'],['Argentina','+54'],['Armenia','+374'],['Australia','+61'],['Austria','+43'],
      ['Azerbaijan','+994'],['Bahamas','+1'],['Bahrain','+973'],['Bangladesh','+880'],['Belarus','+375'],
      ['Belgium','+32'],['Belize','+501'],['Benin','+229'],['Bhutan','+975'],['Bolivia','+591'],
      ['Bosnia and Herzegovina','+387'],['Botswana','+267'],['Brazil','+55'],['Brunei','+673'],['Bulgaria','+359'],
      ['Burkina Faso','+226'],['Burundi','+257'],['Cambodia','+855'],['Cameroon','+237'],['Canada','+1'],
      ['Cape Verde','+238'],['Central African Republic','+236'],['Chad','+235'],['Chile','+56'],['China','+86'],
      ['Colombia','+57'],['Comoros','+269'],['Congo','+242'],['Costa Rica','+506'],["Cote d'Ivoire",'+225'],
      ['Croatia','+385'],['Cuba','+53'],['Cyprus','+357'],['Czech Republic','+420'],['Denmark','+45'],
      ['Djibouti','+253'],['Dominican Republic','+1'],['Ecuador','+593'],['Egypt','+20'],['El Salvador','+503'],
      ['Equatorial Guinea','+240'],['Eritrea','+291'],['Estonia','+372'],['Eswatini','+268'],['Ethiopia','+251'],
      ['Fiji','+679'],['Finland','+358'],['France','+33'],['Gabon','+241'],['Gambia','+220'],
      ['Georgia','+995'],['Germany','+49'],['Ghana','+233'],['Greece','+30'],['Guatemala','+502'],
      ['Guinea','+224'],['Guinea-Bissau','+245'],['Guyana','+592'],['Haiti','+509'],['Honduras','+504'],
      ['Hong Kong','+852'],['Hungary','+36'],['Iceland','+354'],['India','+91'],['Indonesia','+62'],
      ['Iran','+98'],['Iraq','+964'],['Ireland','+353'],['Israel','+972'],['Italy','+39'],
      ['Jamaica','+1'],['Japan','+81'],['Jordan','+962'],['Kazakhstan','+7'],['Kenya','+254'],
      ['Kiribati','+686'],['Kuwait','+965'],['Kyrgyzstan','+996'],['Laos','+856'],['Latvia','+371'],
      ['Lebanon','+961'],['Lesotho','+266'],['Liberia','+231'],['Libya','+218'],['Liechtenstein','+423'],
      ['Lithuania','+370'],['Luxembourg','+352'],['Madagascar','+261'],['Malawi','+265'],['Malaysia','+60'],
      ['Maldives','+960'],['Mali','+223'],['Malta','+356'],['Mauritania','+222'],['Mauritius','+230'],
      ['Mexico','+52'],['Moldova','+373'],['Monaco','+377'],['Mongolia','+976'],['Montenegro','+382'],
      ['Morocco','+212'],['Mozambique','+258'],['Myanmar','+95'],['Namibia','+264'],['Nepal','+977'],
      ['Netherlands','+31'],['New Zealand','+64'],['Nicaragua','+505'],['Niger','+227'],['Nigeria','+234'],
      ['North Korea','+850'],['North Macedonia','+389'],['Norway','+47'],['Oman','+968'],['Panama','+507'],
      ['Papua New Guinea','+675'],['Paraguay','+595'],['Peru','+51'],['Philippines','+63'],['Poland','+48'],
      ['Portugal','+351'],['Qatar','+974'],['Romania','+40'],['Russia','+7'],['Rwanda','+250'],
      ['Saudi Arabia','+966'],['Senegal','+221'],['Serbia','+381'],['Seychelles','+248'],['Sierra Leone','+232'],
      ['Singapore','+65'],['Slovakia','+421'],['Slovenia','+386'],['Somalia','+252'],['South Africa','+27'],
      ['South Korea','+82'],['South Sudan','+211'],['Spain','+34'],['Sri Lanka','+94'],['Sudan','+249'],
      ['Suriname','+597'],['Sweden','+46'],['Switzerland','+41'],['Syria','+963'],['Taiwan','+886'],
      ['Tajikistan','+992'],['Tanzania','+255'],['Thailand','+66'],['Togo','+228'],['Tonga','+676'],
      ['Trinidad and Tobago','+1'],['Tunisia','+216'],['Turkey','+90'],['Turkmenistan','+993'],['Uganda','+256'],
      ['Ukraine','+380'],['United Arab Emirates','+971'],['United Kingdom','+44'],['United States','+1'],['Uruguay','+598'],
      ['Uzbekistan','+998'],['Vanuatu','+678'],['Vatican City','+379'],['Venezuela','+58'],['Vietnam','+84'],
      ['Yemen','+967'],['Zambia','+260'],['Zimbabwe','+263']
    ];

    function populatePhoneCodes() {
      const sel = document.getElementById('signupPhoneCode');
      sel.innerHTML = COUNTRY_CODES.map(([name, code]) =>
        `<option value="${code}" data-name="${name}">${name} (${code})</option>`
      ).join('');
      sel.value = '+92';
    }
    populatePhoneCodes();

    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    let forgotStep = 'email';

    function showMode() {
      const hash = window.location.hash;
      const isLogin = hash === '#login';
      const isForgot = hash === '#forgot';
      const header = document.querySelector('.auth-header h1');
      const subtitle = document.querySelector('.auth-header p');
      const submitBtn = document.querySelector('.auth-submit');
      const footer = document.getElementById('mainFooter');
      const referralField = document.getElementById('signupReferral').closest('.auth-field');
      const usernameField = document.getElementById('usernameField');
      const phoneField = document.getElementById('phoneField');
      const codeField = document.getElementById('forgotCodeField');
      const confirmField = document.getElementById('signupConfirm').closest('.auth-field');
      const passwordField = document.getElementById('signupPassword').closest('.auth-field');
      const forgotLink = document.getElementById('forgotLink');
      const confirmLabel = confirmField.querySelector('label');
      const passwordLabel = passwordField.querySelector('label');
      const emailInput = document.getElementById('signupEmail');

      document.getElementById('authError').style.display = 'none';
      document.getElementById('authSuccess').style.display = 'none';

      const confirmInput = document.getElementById('signupConfirm');

      if (isForgot) {
        referralField.style.display = 'none';
        usernameField.style.display = 'none';
        phoneField.style.display = 'none';
        forgotLink.style.display = 'none';
        footer.innerHTML = 'Remember your password? <a href="/signup.html#login">Sign In</a>';
        document.title = 'Reset Password — MetaLinkNFT';

        if (forgotStep === 'email') {
          header.textContent = 'Reset Password';
          subtitle.textContent = 'Enter your email to receive a verification code';
          submitBtn.textContent = 'Send Reset Code';
          codeField.style.display = 'none';
          confirmField.style.display = 'none';
          passwordField.style.display = 'none';
          confirmInput.required = false;
          emailInput.readOnly = false;
        } else {
          header.textContent = 'Reset Password';
          subtitle.textContent = 'Enter the code sent to your email and a new password';
          submitBtn.textContent = 'Reset Password';
          codeField.style.display = 'block';
          confirmField.style.display = 'block';
          passwordField.style.display = 'block';
          confirmInput.required = true;
          emailInput.readOnly = true;
          passwordLabel.innerHTML = 'New Password <span class="required">*</span>';
          confirmLabel.innerHTML = 'Confirm New Password <span class="required">*</span>';
          document.getElementById('signupPassword').placeholder = 'Enter new password';
          confirmInput.placeholder = 'Re-enter new password';
        }
      } else if (isLogin) {
        emailInput.readOnly = false;
        header.textContent = 'Welcome Back';
        subtitle.textContent = 'Sign in to your MetaLinkNFT account';
        submitBtn.textContent = 'Sign In';
        footer.innerHTML = 'Don\'t have an account? <a href="/signup.html">Sign Up</a>';
        referralField.style.display = 'none';
        usernameField.style.display = 'none';
        phoneField.style.display = 'none';
        codeField.style.display = 'none';
        confirmField.style.display = 'none';
        passwordField.style.display = 'block';
        forgotLink.style.display = 'block';
        confirmInput.required = false;
        passwordLabel.innerHTML = 'Password <span class="required">*</span>';
        document.getElementById('signupPassword').placeholder = 'Min 6 characters';
        document.title = 'Sign In — MetaLinkNFT';
      } else {
        emailInput.readOnly = false;
        header.textContent = 'Create Account';
        subtitle.textContent = 'Join MetaLinkNFT and start trading NFTs';
        submitBtn.textContent = 'Create Account';
        footer.innerHTML = 'Already have an account? <a href="/signup.html#login">Sign In</a>';
        referralField.style.display = 'block';
        usernameField.style.display = 'block';
        phoneField.style.display = 'block';
        codeField.style.display = 'none';
        confirmField.style.display = 'block';
        passwordField.style.display = 'block';
        forgotLink.style.display = 'none';
        confirmInput.required = true;
        passwordLabel.innerHTML = 'Password <span class="required">*</span>';
        confirmLabel.innerHTML = 'Confirm Password <span class="required">*</span>';
        document.getElementById('signupPassword').placeholder = 'Min 6 characters';
        confirmInput.placeholder = 'Re-enter password';
        document.title = 'Sign Up — MetaLinkNFT';
      }
    }

    window.addEventListener('hashchange', () => { forgotStep = 'email'; showMode(); });
    showMode();

    function showSuccess(msg) {
      const el = document.getElementById('authSuccess');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function showRedirectLoader() {
      document.getElementById('redirectLoader').style.display = 'flex';
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const hash = window.location.hash;
      const isLogin = hash === '#login';
      const isForgot = hash === '#forgot';
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const submitBtn = document.querySelector('.auth-submit');

      submitBtn.disabled = true;

      try {
        if (isForgot && forgotStep === 'email') {
          submitBtn.textContent = 'Sending...';
          const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          forgotStep = 'reset';
          showMode();
          showSuccess('If that email is registered, a code has been sent.');
        } else if (isForgot && forgotStep === 'reset') {
          submitBtn.textContent = 'Resetting...';
          const code = document.getElementById('forgotCode').value;
          const confirmPassword = document.getElementById('signupConfirm').value;
          const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code, password, confirmPassword })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          showSuccess('Password reset successfully! Redirecting to sign in...');
          setTimeout(() => { window.location.hash = '#login'; }, 2000);
        } else if (isLogin) {
          submitBtn.textContent = 'Signing in...';
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          localStorage.setItem('mlk_token', data.token);
          localStorage.setItem('mlk_user', JSON.stringify(data.user));
          showRedirectLoader();
          window.location.href = '/app.html';
        } else {
          submitBtn.textContent = 'Creating account...';
          const username = document.getElementById('signupUsername').value.trim();
          const confirmPassword = document.getElementById('signupConfirm').value;
          const referralCode = document.getElementById('signupReferral').value;
          const phoneCountryCode = document.getElementById('signupPhoneCode').value;
          const phoneNumber = document.getElementById('signupPhone').value;
          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password, confirmPassword, referralCode, phoneCountryCode, phoneNumber })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          pendingVerifyEmail = email;
          document.getElementById('verifyEmailDisplay').textContent = email;
          document.getElementById('signupForm').style.display = 'none';
          document.getElementById('mainFooter').style.display = 'none';
          document.getElementById('verifyStep').style.display = 'block';
        }
      } catch (err) {
        showError(err.message);
      } finally {
        submitBtn.disabled = false;
        if (isForgot) submitBtn.textContent = forgotStep === 'email' ? 'Send Reset Code' : 'Reset Password';
        else if (isLogin) submitBtn.textContent = 'Sign In';
        else submitBtn.textContent = 'Create Account';
      }
    });

    let pendingVerifyEmail = null;

    function showVerifyError(msg) {
      const el = document.getElementById('verifyError');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    function showVerifySuccess(msg) {
      const el = document.getElementById('verifySuccess');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    document.getElementById('verifySubmitBtn').addEventListener('click', async () => {
      const btn = document.getElementById('verifySubmitBtn');
      const code = document.getElementById('verifyCode').value.trim();
      if (!code) { showVerifyError('Enter the verification code'); return; }
      btn.disabled = true;
      btn.textContent = 'Verifying...';
      try {
        const res = await fetch('/api/auth/verify-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingVerifyEmail, code })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('mlk_token', data.token);
        localStorage.setItem('mlk_user', JSON.stringify(data.user));
        showRedirectLoader();
        window.location.href = '/app.html';
      } catch (err) {
        showVerifyError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Confirm';
      }
    });

    document.getElementById('resendCodeLink').addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch('/api/auth/resend-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingVerifyEmail })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showVerifySuccess('A new code has been sent to your email');
      } catch (err) {
        showVerifyError(err.message);
      }
    });

    document.getElementById('resendForgotCodeLink').addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('signupEmail').value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showSuccess('A new code has been sent to your email');
      } catch (err) {
        showError(err.message);
      }
    });
  </script>
</body>
</html>
